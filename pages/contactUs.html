<!doctype html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script type="module">
      import "https://esm.run/@material/web/all.js";
      import { styles as typescaleStyles } from "https://esm.run/@material/web/typography/md-typescale-styles.js";

      document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>
  </head>
  <body id="faqs-base-styling">
    <header class="navbar"></header>
    <div class="contact-container">
      <div class="content">
        <div class="form-side">
          <h1>Get in Touch</h1>
          <p>We're here to help &mdash; drop us a message!</p>
          <form id="form">
            <md-outlined-text-field class="textcontent" label="Your name" required type="text" value="">
            </md-outlined-text-field>
            <md-outlined-text-field class="textcontent" label="Your email" required type="email" value="">
            </md-outlined-text-field>
            <md-outlined-text-field class="textcontent" label="Your phone number" type="tel" value="">
            </md-outlined-text-field>
            <style>
              md-filled-text-field {
                resize: vertical;
              }
            </style>
            <md-filled-text-field class="textcontent" label="how can we help you?" required rows="3" type="textarea">
            </md-filled-text-field>
            <md-filled-button id="submitbutton">Send Message</md-filled-button>
          </form>
        </div>
      </div>
    </div>
    <script src="/src/contactUs.ts" type="module"></script>
    <script src="/src/header.ts" type="module"></script>
  </body>
</html>
