<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="/public/css/styles.css" />
  </head>
  <body id="faqs-base-styling">
    <header class="navbar"></header>
    <div class="contact-container">
      <div class="content">
        <div class="form-side">
          <h1>Get in Touch</h1>
          <p>We're here to help — drop us a message!</p>

          <form id="form">
            <input class="textcontent" type="text" name="name" placeholder="Your Name" required />
            <input class="textcontent" type="email" name="email" placeholder="Email Address" required />
            <input class="textcontent" type="tel" name="phone" placeholder="Phone Number" />
            <textarea class="textcontent" name="message" placeholder="How can we help you?" required></textarea>
            <button id="submitbutton" type="submit" class="btn-styling">Send Message</button>
          </form>
        </div>
      </div>
    </div>
    <script src="/public/js/contact-us.js" type="module"></script>
    <script src="/public/js/header.js" type="module"></script>
  </body>
</html>
